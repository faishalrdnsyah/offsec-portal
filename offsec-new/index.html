<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign in — Offensive &amp; New Dev Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet"/>
<style>
  :root {
    --primary:        #dc2626;
    --primary-600:    #b91c1c;
    --primary-soft:   rgba(220, 38, 38, 0.18);
    --accent:         #10b981;
    --warn:           #f59e0b;
    --info:           #3b82f6;
    --radius-sm: 6px;
    --radius:    10px;
    --radius-lg: 14px;
  }
  html[data-theme="dark"] {
    --bg:            #0b1220;
    --surface:       #111c2e;
    --surface-2:     #18243a;
    --border:        #1f2d44;
    --border-strong: #2c3e5e;
    --text:          #e2e8f0;
    --text-muted:    #94a3b8;
    --text-faint:    #64748b;
    --shadow-card:   0 24px 60px -20px rgba(0,0,0,0.75), 0 6px 18px -8px rgba(0,0,0,0.45);
  }
  html[data-theme="light"] {
    --bg:            #f6f7f8;
    --surface:       #ffffff;
    --surface-2:     #f1f5f9;
    --border:        #e2e8f0;
    --border-strong: #cbd5e1;
    --text:          #0f172a;
    --text-muted:    #64748b;
    --text-faint:    #94a3b8;
    --shadow-card:   0 24px 60px -20px rgba(15,23,42,0.18), 0 6px 18px -8px rgba(15,23,42,0.08);
  }
  html[data-theme="midnight"] {
    --bg:            #14080d;
    --surface:       #1f1218;
    --surface-2:     #2a1a22;
    --border:        #3a2530;
    --border-strong: #4d3441;
    --text:          #f5edee;
    --text-muted:    #a89599;
    --text-faint:    #75666a;
    --shadow-card:   0 24px 60px -20px rgba(0,0,0,0.85), 0 6px 18px -8px rgba(0,0,0,0.55);
  }

  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', monospace; font-feature-settings: 'tnum'; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; user-select: none; }
  .ms-fill { font-variation-settings: 'FILL' 1; }

  /* Background pattern + vignette to match landing */
  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 64px 64px;
    background-position: -1px -1px;
    opacity: 0.32;
    pointer-events: none;
  }
  .vignette {
    position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(circle at 50% 30%, rgba(220,38,38,0.14), transparent 55%),
      radial-gradient(circle at 50% 110%, rgba(59,130,246,0.06), transparent 50%);
  }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px;
    position: relative; z-index: 2;
  }
  .brand-mark { color: var(--primary); display: inline-flex; align-items: center; justify-content: center; }
  .brand-mark svg { width: 100%; height: 100%; display: block; }

  .tb-btn {
    display: inline-flex; align-items: center; justify-content: center;
    height: 36px; min-width: 36px; padding: 0 10px;
    border-radius: 8px;
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid transparent;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .tb-btn:hover { background: var(--border); }

  .theme-row { display: inline-flex; background: var(--surface-2); border-radius: 8px; padding: 3px; gap: 2px; border: 1px solid var(--border); }
  .theme-row button {
    background: transparent; border: none;
    color: var(--text-muted); padding: 5px 10px; border-radius: 6px;
    cursor: pointer; font-family: inherit;
  }
  .theme-row button.on { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  .theme-row button .material-symbols-outlined { font-size: 15px; vertical-align: middle; }

  /* Login card */
  .login-shell { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px 36px 30px;
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
  }
  /* Red glow on the top edge */
  .login-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    opacity: 0.7;
  }
  .login-card::after {
    content: ""; position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(220,38,38,0.22), transparent 65%);
    pointer-events: none;
  }
  .login-content { position: relative; z-index: 1; }

  /* Brand at top of card */
  .login-brand {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    margin-bottom: 28px;
  }
  .login-brand .mark {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--primary), #7c1d1d);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    box-shadow: 0 12px 24px -8px rgba(220,38,38,0.45);
  }
  .login-brand .mark .brand-mark { width: 30px; height: 30px; color: #fff; }
  .login-brand .name { font-size: 13px; font-weight: 800; letter-spacing: -0.01em; color: var(--text); }
  .login-brand .sub { font-size: 10.5px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.08em; margin-top: -8px; }

  .login-h {
    text-align: center;
    font-size: 22px; font-weight: 900; letter-spacing: -0.02em;
    color: var(--text);
    margin: 0 0 6px;
  }
  .login-sub {
    text-align: center;
    font-size: 13px; color: var(--text-muted);
    margin: 0 0 26px;
  }

  /* Field */
  .field-group { margin-bottom: 14px; }
  .field-label {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field-label a {
    text-transform: none; letter-spacing: 0; font-weight: 500; font-size: 12px;
    color: var(--primary); text-decoration: none;
  }
  .field-label a:hover { text-decoration: underline; }

  .field-wrap {
    position: relative;
    display: flex; align-items: center;
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field-wrap:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-soft);
  }
  .field-wrap .ico-lead {
    padding: 0 10px 0 14px;
    color: var(--text-muted);
    display: flex; align-items: center;
  }
  .field-wrap .ico-lead .material-symbols-outlined { font-size: 18px; }
  .field-input {
    flex: 1;
    background: transparent; border: none; outline: none;
    padding: 11px 0 11px 0;
    font-family: inherit; font-size: 14px;
    color: var(--text);
  }
  .field-input::placeholder { color: var(--text-faint); }
  .field-trail {
    padding: 0 12px;
    background: none; border: none; cursor: pointer;
    color: var(--text-muted);
    display: flex; align-items: center;
  }
  .field-trail:hover { color: var(--text); }

  /* Checkbox */
  .check-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-muted);
    margin: 6px 0 22px;
    cursor: pointer; user-select: none;
  }
  .check-box {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border-strong);
    background: var(--surface-2);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .check-box.on { background: var(--primary); border-color: var(--primary); }
  .check-box.on::after {
    content: "";
    width: 8px; height: 5px;
    border-left: 2px solid white; border-bottom: 2px solid white;
    transform: rotate(-45deg) translate(1px, -1px);
  }

  /* Sign in button */
  .btn-primary {
    width: 100%;
    background: var(--primary);
    color: #fff;
    font-weight: 700; font-size: 14px;
    padding: 12px 16px;
    border: none; border-radius: 10px;
    cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    box-shadow: 0 8px 20px -8px rgba(220,38,38,0.6);
    transition: background 0.15s, transform 0.1s;
  }
  .btn-primary:hover { background: var(--primary-600); }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:disabled {
    background: var(--surface-2); color: var(--text-faint);
    cursor: not-allowed; box-shadow: none;
  }
  .btn-primary .material-symbols-outlined { font-size: 17px; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0 16px;
    font-size: 11px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .divider::before, .divider::after {
    content: ""; flex: 1; height: 1px; background: var(--border);
  }

  .btn-soft {
    width: 100%;
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border-strong);
    font-weight: 600; font-size: 13.5px;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.15s;
  }
  .btn-soft:hover { background: var(--border); }
  .btn-soft .material-symbols-outlined { font-size: 17px; }

  .signup-line {
    text-align: center;
    margin-top: 22px;
    font-size: 12.5px; color: var(--text-muted);
  }
  .signup-line a { color: var(--primary); font-weight: 600; text-decoration: none; }
  .signup-line a:hover { text-decoration: underline; }

  /* Status chip below card */
  .status-chip {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.08em;
    color: var(--text-muted);
    padding: 5px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    margin-top: 20px;
  }
  .status-chip .pulse {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 8px rgba(16,185,129,0.7);
    animation: pulse 1.6s steps(2) infinite;
  }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* Error shake */
  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .alert {
    display: flex; align-items: center; gap: 8px;
    background: rgba(220,38,38,0.12);
    color: #fca5a5;
    border: 1px solid rgba(220,38,38,0.3);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12.5px;
    margin-bottom: 14px;
  }
  .alert .material-symbols-outlined { font-size: 17px; }
</style>
</head>

        <div class="name">Offensive &amp; New Dev Portal</div>
      </div>

      <h1 class="login-h">Welcome back</h1>
      <p class="login-sub">Sign in to continue to your workspace.</p>

      <div id="alert-box"></div>

      <form id="login-form" autocomplete="on">

        <div class="field-group">
          <label class="field-label" for="email">
            Email or username
          </label>
          <div class="field-wrap">
            <span class="ico-lead"><span class="material-symbols-outlined">person</span></span>
            <input id="email" class="field-input" type="text" placeholder="alex@offsec.local" autocomplete="username" required />
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">
            Password
            <a href="#" id="forgot">Forgot password?</a>
          </label>
          <div class="field-wrap">
            <span class="ico-lead"><span class="material-symbols-outlined">lock</span></span>
            <input id="password" class="field-input" type="password" placeholder="••••••••••" autocomplete="current-password" required />
            <button type="button" class="field-trail" id="toggle-pw" aria-label="Show password">
              <span class="material-symbols-outlined" id="pw-eye">visibility</span>
            </button>
          </div>
        </div>

        <label class="check-row" id="remember-row">
          <span class="check-box on" id="remember-box"></span>
          <span>Keep me signed in on this device</span>
        </label>

        <button type="submit" class="btn-primary" id="signin-btn">
          <span id="signin-label">Sign in</span>
          <span class="material-symbols-outlined" id="signin-icon">arrow_forward</span>
        </button>

      </form>

      <div class="signup-line">
        Need an account? <a href="#">Contact your administrator</a>
      </div>
    </div>
  </div>
</div>

<script>
  // ============== Password show / hide ==============
  const pwInput = document.getElementById('password');
  const pwEye = document.getElementById('pw-eye');
  document.getElementById('toggle-pw').addEventListener('click', () => {
    if (pwInput.type === 'password') { pwInput.type = 'text'; pwEye.textContent = 'visibility_off'; }
    else { pwInput.type = 'password'; pwEye.textContent = 'visibility'; }
  });

  // ============== Remember toggle ==============
  const rememberRow = document.getElementById('remember-row');
  const rememberBox = document.getElementById('remember-box');
  let remember = true;
  rememberRow.addEventListener('click', () => {
    remember = !remember;
    rememberBox.classList.toggle('on', remember);
  });

  // ============== Alert helper ==============
  function showAlert(msg) {
    const box = document.getElementById('alert-box');
    box.innerHTML = `<div class="alert"><span class="material-symbols-outlined ms-fill">error</span><span>${msg}</span></div>`;
    const card = document.getElementById('login-card');
    card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
  }
  function clearAlert() { document.getElementById('alert-box').innerHTML = ''; }

  // ============== Submit ==============
  const form = document.getElementById('login-form');
  const btn = document.getElementById('signin-btn');
  const label = document.getElementById('signin-label');
  const icon = document.getElementById('signin-icon');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pw = pwInput.value;
    clearAlert();
    if (!email || !pw) { showAlert('Please enter both email and password.'); return; }
    if (pw.length < 4) { showAlert('That password looks too short.'); return; }

    btn.disabled = true;
    label.textContent = 'Signing in…';
    icon.textContent = 'progress_activity';
    icon.style.animation = 'spin 0.8s linear infinite';

    setTimeout(() => {
      // Demo: route to portal selection
      window.location.href = 'portal-select.html';
    }, 900);
  });

  // Forgot link
  document.getElementById('forgot').addEventListener('click', (e) => {
    e.preventDefault();
    showAlert('Password reset link sent (demo).');
  });
</script>
<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
</html>
