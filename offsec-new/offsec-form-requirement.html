<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Form &amp; Requirement — Offensive Sec Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet"/>
<link rel="stylesheet" href="shell.css"/>
<style>
  .type-chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 6px; font-size: 11.5px; font-weight: 600; background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
  .type-chip .material-symbols-outlined { font-size: 14px; }
  .count-chip { display: inline-flex; align-items: center; gap: 5px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); }
  .count-chip .material-symbols-outlined { font-size: 15px; color: var(--text-faint); }
</style>
</head>
<body data-page="form-requirement">

<div class="shell">
  <aside data-shell="sidebar"></aside>
  <div style="display:flex; flex-direction:column; height:100vh; overflow:hidden; background: var(--bg);">
    <header data-shell="topbar"></header>

    <main class="flex-1 overflow-y-auto" style="padding: 22px 24px 40px">
      <div style="max-width: 1400px; margin: 0 auto; display:flex; flex-direction:column; gap: 18px;">

        <!-- Header row -->
        <div style="display:flex; justify-content:space-between; align-items:center; gap: 16px; flex-wrap: wrap;">
          <div style="display:flex; gap: 18px; align-items:center; flex-wrap: wrap;">
            <div class="card" style="padding: 12px 18px; display:flex; align-items:center; gap: 12px;">
              <div class="ico-bullet ms-fill material-symbols-outlined" style="width:32px; height:32px; font-size:18px">assignment</div>
              <div>
                <div style="font-size: 11px; color: var(--text-muted); font-weight:600">Total forms</div>
                <div class="mono" style="font-size: 18px; font-weight: 800; line-height:1" id="stat-total">—</div>
              </div>
            </div>
            <div class="card" style="padding: 12px 18px; display:flex; align-items:center; gap: 12px;">
              <div style="width:32px; height:32px; background: rgba(168,85,247,0.18); color: #a855f7; border-radius: 7px; display:flex; align-items:center; justify-content:center;">
                <span class="material-symbols-outlined ms-fill" style="font-size:18px">rate_review</span>
              </div>
              <div>
                <div style="font-size: 11px; color: var(--text-muted); font-weight:600">In review</div>
                <div class="mono" style="font-size: 18px; font-weight: 800; line-height:1" id="stat-review">—</div>
              </div>
            </div>
            <div class="card" style="padding: 12px 18px; display:flex; align-items:center; gap: 12px;">
              <div style="width:32px; height:32px; background: rgba(16,185,129,0.18); color: var(--accent); border-radius: 7px; display:flex; align-items:center; justify-content:center;">
                <span class="material-symbols-outlined ms-fill" style="font-size:18px">task_alt</span>
              </div>
              <div>
                <div style="font-size: 11px; color: var(--text-muted); font-weight:600">Approved</div>
                <div class="mono" style="font-size: 18px; font-weight: 800; line-height:1" id="stat-approved">—</div>
              </div>
            </div>
          </div>
          <div style="display:flex; gap: 8px;">
            <button class="btn btn-ghost"><span class="material-symbols-outlined">download</span>Export</button>
            <a class="btn btn-primary" href="offsec-form-requirement-create.html"><span class="material-symbols-outlined">add</span>New form</a>
          </div>
        </div>

        <!-- Filter bar -->
        <div class="card" style="padding: 12px 14px; display:flex; gap: 10px; align-items: center; flex-wrap: wrap;">
          <div style="position: relative; flex: 1; min-width: 240px;">
            <span class="material-symbols-outlined" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 18px;">search</span>
            <input id="search" class="field" placeholder="Search application, project, owner…" style="padding-left: 36px;" oninput="render()"/>
          </div>
          <select id="f-status" class="field" style="width: auto;" onchange="render()">
            <option value="">All statuses</option>
            <option>Draft</option><option>Submitted</option><option>In Review</option><option>Approved</option>
          </select>
          <select id="f-type" class="field" style="width: auto;" onchange="render()">
            <option value="">All types</option>
          </select>
        </div>

        <!-- Table -->
        <div class="card" style="padding: 0; overflow: hidden;">
          <div style="overflow-x: auto;">
            <table class="tbl">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Application</th>
                  <th>VAPT Project</th>
                  <th>Type</th>
                  <th>Requirements</th>
                  <th>Blacklist</th>
                  <th>Owner</th>
                  <th>Created</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
          <div id="empty" class="empty-state" style="display:none;">
            <span class="material-symbols-outlined">assignment_late</span>
            <div class="empty-state-title">No forms match those filters.</div>
            <div class="empty-state-sub">Try clearing a filter or creating a new form &amp; requirement.</div>
            <a class="btn btn-primary btn-sm" href="offsec-form-requirement-create.html" style="margin-top:6px"><span class="material-symbols-outlined">add</span>New form</a>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="shell.js"></script>
<script src="form-requirement-data.js"></script>
<script>
const TYPE_ICON = {
  'Web Application': 'language',
  'Mobile Application': 'smartphone',
  'API / Web Service': 'api',
  'Infrastructure / Network': 'dns',
  'Desktop / Thick Client': 'desktop_windows',
};

function fmtDate(d) { return new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit' }); }
function initials(name) { return name.split(' ').map(s => s[0]).slice(0,2).join('').toUpperCase(); }

// Populate type filter
const typeSel = document.getElementById('f-type');
APP_TYPES.forEach(t => { const o = document.createElement('option'); o.textContent = t; typeSel.appendChild(o); });

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const s = document.getElementById('f-status').value;
  const t = document.getElementById('f-type').value;
  return FORMREQS.filter(r =>
    (!q || (r.application + r.project + r.createdBy + r.id + r.form.appName).toLowerCase().includes(q)) &&
    (!s || r.status === s) &&
    (!t || r.form.appType === t)
  );
}

function render() {
  const rows = applyFilters();
  const body = document.getElementById('rows');
  const empty = document.getElementById('empty');

  // stats (over full dataset)
  document.getElementById('stat-total').textContent    = FORMREQS.length;
  document.getElementById('stat-review').textContent   = FORMREQS.filter(r => r.status === 'In Review').length;
  document.getElementById('stat-approved').textContent = FORMREQS.filter(r => r.status === 'Approved').length;

  if (!rows.length) { body.innerHTML = ''; empty.style.display = 'flex'; return; }
  empty.style.display = 'none';
  body.innerHTML = rows.map(r => `
    <tr class="clickable" onclick="location.href='offsec-form-requirement-detail.html?id=${r.id}'">
      <td><span class="mono" style="color: var(--text-muted); font-size:12px">${r.id}</span></td>
      <td>
        <div style="font-weight: 600; color: var(--text); font-size:13px">${r.form.appName}</div>
        <div style="font-size: 11.5px; color: var(--text-muted); margin-top:1px">${r.application}</div>
      </td>
      <td><span style="font-size: 12.5px; color: var(--text-muted)">${r.project}</span></td>
      <td><span class="type-chip"><span class="material-symbols-outlined">${TYPE_ICON[r.form.appType] || 'category'}</span>${r.form.appType}</span></td>
      <td><span class="count-chip"><span class="material-symbols-outlined">vpn_key</span>${r.requirements.length}</span></td>
      <td><span class="count-chip"><span class="material-symbols-outlined">block</span>${r.blacklist.length}</span></td>
      <td>
        <div style="display:flex; align-items:center; gap: 8px;">
          <span style="width:26px; height:26px; border-radius:50%; background: var(--primary); color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;">${initials(r.createdBy)}</span>
          <span style="font-size: 12.5px;">${r.createdBy}</span>
        </div>
      </td>
      <td class="mono" style="font-size: 11.5px; color: var(--text-muted)">${fmtDate(r.createdDate)}</td>
      <td><span class="pill ${FR_STATUS_PILL[r.status]}"><span class="dot"></span>${r.status}</span></td>
      <td><span class="material-symbols-outlined" style="color: var(--text-faint); font-size:18px">chevron_right</span></td>
    </tr>
  `).join('');
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
